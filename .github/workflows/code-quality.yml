name: Code quality checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      uses: astral-sh/setup-uv@v2
      with:
        version: "0.10.12"

    - name: Install dependencies
      run: uv sync --locked

    - name: Run pytest
      run: |
        echo "Running pytest..."
        uv run pytest

    - name: Run pylint
      run: |
        echo "Running pylint..."
        uv run pylint src/ tests/
